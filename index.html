<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Jeopardy - Meny</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splash-screen">
        <h1>Jeopardy</h1>
        <div id="splash-buttons">
            <button id="create-board">Skapa Nytt Bräde</button>
            <button id="import-board-btn">Importera Bräde</button>
        </div>
        <div id="existing-boards">
            <h2>Dina sparade bräden</h2>
            <ul id="board-list"></ul>
        </div>
    </div>

    <div id="edit-mode" style="display: none;">
        <div id="edit-mode-buttons">
            <button id="save-board">Spara Bräde</button>
            <button id="return-main">Tillbaka till Start</button>
        </div>
        <div id="edit-grid"></div>
    </div>

    <div id="generic-modal" class="custom-modal" style="display: none;">
        <div class="modal-content">
            <span class="close-x" onclick="document.getElementById('generic-modal').style.display='none'">&times;</span>
            <h2 id="generic-modal-title">Meddelande</h2>
            <p id="generic-modal-text"></p>
            <button onclick="document.getElementById('generic-modal').style.display='none'">OK</button>
        </div>
    </div>

    <div id="import-modal" class="custom-modal" style="display: none;">
        <div class="modal-content">
            <span class="close-x" onclick="document.getElementById('import-modal').style.display='none'">&times;</span>
            <h2>Importera Bräde</h2>
            <p>Klistra in nyckeln för brädet nedan:</p>
            <textarea id="import-key-input" rows="4"></textarea>
            <button id="confirm-import-btn">Importera</button>
            <button class="cancel-btn" onclick="document.getElementById('import-modal').style.display='none'">Avbryt</button>
        </div>
    </div>

    <div id="share-modal" class="custom-modal" style="display: none;">
        <div class="modal-content">
            <span class="close-x" onclick="document.getElementById('share-modal').style.display='none'">&times;</span>
            <h2>Dela Bräde</h2>
            <p>Kopiera nyckeln nedan:</p>
            <textarea id="share-key-output" rows="4" readonly></textarea>
            <button id="copy-key-btn">Kopiera Nyckel</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
