<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeopardy - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden flex font-sans">

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl transform translate-y-24 opacity-0 transition-all duration-300 z-[100] font-bold text-sm flex items-center gap-3 pointer-events-none">
        <span id="toastIcon">✨</span>
        <span id="toastMsg">Meddelande</span>
    </div>

    <div id="aiModal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-50 backdrop-blur-sm opacity-0 transition-opacity duration-200">
        <div class="bg-white p-8 rounded-3xl max-w-lg w-full shadow-2xl transform scale-95 transition-transform duration-200" id="aiModalContent">
            <h3 class="text-2xl font-black mb-2 flex items-center gap-2 text-blue-600">✨ Skapa Jeopardy med AI</h3>
            <p class="text-slate-500 mb-6 text-sm">Beskriv ett tema! AI:n bygger upp 6 kategorier med 5 frågor (100-500p) och svar i varje.</p>
            
            <textarea id="aiPrompt" class="w-full h-32 bg-slate-50 border border-slate-200 rounded-lg p-4 font-medium text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent mb-4 resize-none" placeholder="T.ex. '90-tals nostalgi', 'Biologi och natur'..."></textarea>
            
            <div id="aiLoading" class="hidden flex-col items-center justify-center py-4 mb-4">
                <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-2"></div>
                <p class="text-sm font-bold text-blue-600 animate-pulse">AI:n bygger spelbrädet...</p>
            </div>

            <div class="flex gap-3 mt-2" id="aiButtons">
                <button onclick="closeAiModal()" class="flex-1 px-4 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition">Avbryt</button>
                <button onclick="generateAiBoard()" class="flex-1 px-4 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition shadow-md">Generera Bräde</button>
            </div>
        </div>
    </div>

    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col shadow-sm z-10 flex-shrink-0">
        <div class="p-6 border-b border-slate-100 flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-md">
                <span class="font-black text-xl">J!</span>
            </div>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">Jeopardy</h1>
        </div>
        
        <div class="p-4 flex-1 overflow-hidden flex flex-col">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 px-2">Dina Bräden</h2>
            <div id="boardsList" class="space-y-1 overflow-y-auto flex-1 pb-10">
                </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-slate-50/50 overflow-hidden">
        <header class="h-20 border-b border-slate-200 bg-white/80 backdrop-blur px-8 flex items-center justify-end gap-3 flex-shrink-0">
            <button id="btnAuthAi" class="px-4 py-2 text-sm font-semibold text-slate-800 bg-gradient-to-r from-amber-200 to-amber-400 hover:from-amber-300 hover:to-amber-500 rounded-md transition-colors flex items-center gap-2 shadow-sm border border-amber-300">
                ✨ Generera med AI
            </button>
            <button id="btnImport" class="px-4 py-2 text-sm font-semibold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-md transition-colors flex items-center gap-2 border border-slate-200">
                Klistra in JSON
            </button>
            <button onclick="createNewBoard()" class="px-4 py-2 text-sm font-semibold text-white bg-slate-800 hover:bg-slate-900 rounded-md transition-colors flex items-center gap-2 shadow-sm">
                + Skapa Nytt Bräde
            </button>
        </header>

        <div id="mainContent" class="flex-1 overflow-y-auto p-8">
            <div id="emptyState" class="h-full flex flex-col items-center justify-center text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-24 w-24 mb-4 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
                <p class="text-xl font-bold">Välj ett bräde i menyn eller skapa ett nytt.</p>
            </div>
        </div>
    </main>

    <script type="module" src="index.js"></script>
    <script type="module" src="ai.js"></script>
</body>
</html>
